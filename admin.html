<!DOCTYPE html>
<html>
<head>
<title>Principal Control Panel</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  width:350px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:20px;
}

button{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
  color:white;
  cursor:pointer;
}

.open{background:#2ecc71;}
.close{background:#e74c3c;}

#status{
  margin-top:15px;
  font-weight:bold;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div class="card" id="loginBox">

<h2>Principal Login</h2>

<input id="username" placeholder="Enter ID">
<input id="password" type="password" placeholder="Enter Password">

<button class="open" onclick="login()">Login</button>

</div>


<!-- 🎛️ ORIGINAL PANEL (UNCHANGED UI) -->
<div class="card" id="adminPanel" style="display:none;">

<h2>Headmaster Election Control</h2>

<button class="open" onclick="start()">Start Election</button>
<button class="close" onclick="stop()">Close Election</button>

<div id="status">Checking status...</div>

</div>


<script>

// 🔗 SAME SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKyrj6Mr9531Ber_Q2bNWncPxAEVtVALvnE_GU0l6cGh8Jj2qOLor1Bg8JcZihTK2X/exec";


// 🔐 LOGIN FUNCTION
function login(){

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  // 👉 CHANGE THESE AS YOU WANT
  if(user === "principal" && pass === "1234"){

    // Hide login, show panel
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

  } else {
    alert("Invalid ID or Password");
  }
}


// 🟢 START
async function start(){
  await fetch(SCRIPT_URL + "?api=1&action=open");
  showMessage("🟢 Election Started - All can vote now");
}


// 🔴 STOP
async function stop(){
  await fetch(SCRIPT_URL + "?api=1&action=close");
  showMessage("🔴 Election Closed - Voting disabled");
}


// 💬 MESSAGE
function showMessage(msg){
  document.getElementById("status").innerHTML = msg;
}


// 🔄 STATUS
async function check(){
  try{
    let res = await fetch(SCRIPT_URL + "?api=1");
    let data = await res.json();

    let s = document.getElementById("status");

    if(data.status === "OPEN"){
      s.innerHTML = "🟢 Election is OPEN";
      s.style.color = "green";
    }else{
      s.innerHTML = "🔴 Election is CLOSED";
      s.style.color = "red";
    }

  }catch(e){
    document.getElementById("status").innerHTML = "⚠️ Connection issue";
  }
}

setInterval(check,2000);
check();

</script>

</body>
</html>
